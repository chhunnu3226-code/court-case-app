<!DOCTYPE html>
<html>
<head>
  <title>Court Case Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSS will be added later -->
</head>
<body>

  <!-- Top bar with user info -->
  <div id="topBar" style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #ccc;">
    <div id="userInfo" style="display:none;">
      <img id="userPhoto" src="" alt="User Photo" style="width:40px; height:40px; border-radius:50%; vertical-align:middle;">
      <span id="userName" style="margin-left:10px; font-weight:bold;"></span>
    </div>
    <div id="courtNameDisplay" style="display:none; font-weight:bold;"></div>
  </div>

  <!-- Main content -->
  <div style="text-align:center; margin-top:50px;">

    <!-- Login Button -->
    <button id="loginBtn" onclick="login()">Login with Google</button>

    <!-- Court Name Input -->
    <div id="courtNameDiv" style="display:none; margin-top:20px;">
      <input type="text" id="courtNameInput" placeholder="Enter your Court Name">
      <button onclick="saveCourtName()">Save Court Name</button>
    </div>

    <!-- Main Features -->
    <div id="mainFeatures" style="display:none; margin-top:30px;">
      <h2>Main Features</h2>
      <a href="#" id="allCasesLink">All Cases (Excel Style)</a>
      <a href="#" id="orderSheetLink">Order Sheet Maker</a>
      <a href="#" id="noticeMakerLink">Notice Maker</a>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } 
      from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } 
      from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } 
      from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyC4XtFoWYizUUVlhI5pQqwbxcxmjOwyWY0",
      authDomain: "court-case-manager-99e61.firebaseapp.com",
      projectId: "court-case-manager-99e61",
      storageBucket: "court-case-manager-99e61.firebasestorage.app",
      messagingSenderId: "446835586016",
      appId: "1:446835586016:web:57083df006340ca4173185"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Login Function
    window.login = function() {
      signInWithPopup(auth, provider)
        .then((result) => {
          alert("Login successful: " + result.user.email);
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
    };

    // Show user info after login
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        document.getElementById("loginBtn").style.display = "none";

        // Show user name & photo
        document.getElementById("userInfo").style.display = "flex";
        document.getElementById("userName").textContent = user.displayName;
        document.getElementById("userPhoto").src = user.photoURL;

        // Check if court name already exists in Firestore
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists() && docSnap.data().courtName) {
          document.getElementById("courtNameDisplay").textContent = docSnap.data().courtName;
          document.getElementById("courtNameDisplay").style.display = "block";
          document.getElementById("mainFeatures").style.display = "block";
        } else {
          // Show court name input if not saved yet
          document.getElementById("courtNameDiv").style.display = "block";
        }
      } else {
        // User logged out
        document.getElementById("loginBtn").style.display = "block";
        document.getElementById("userInfo").style.display = "none";
        document.getElementById("courtNameDiv").style.display = "none";
        document.getElementById("mainFeatures").style.display = "none";
        document.getElementById("courtNameDisplay").style.display = "none";
      }
    });

    // Save court name
    window.saveCourtName = async function() {
      const courtName = document.getElementById("courtNameInput").value.trim();
      const user = auth.currentUser;

      if (!courtName) {
        alert("Please enter court name");
        return;
      }

      if (user) {
        await setDoc(doc(db, "users", user.uid), {
          email: user.email,
          courtName: courtName
        });

        // Hide input, show court name in top corner, show features
        document.getElementById("courtNameDiv").style.display = "none";
        document.getElementById("courtNameDisplay").textContent = courtName;
        document.getElementById("courtNameDisplay").style.display = "block";
        document.getElementById("mainFeatures").style.display = "block";

        alert("Court name saved successfully!");
      } else {
        alert("User not logged in!");
      }
    };

    // Placeholder links
    document.getElementById("allCasesLink").onclick = () => alert("All Cases page coming soon");
    document.getElementById("orderSheetLink").onclick = () => alert("Order Sheet page coming soon");
    document.getElementById("noticeMakerLink").onclick = () => alert("Notice Maker page coming soon");

  </script>

</body>
</html>
