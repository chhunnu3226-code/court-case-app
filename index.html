<!DOCTYPE html>
<html>
<head>
  <title>Court Case Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"> <!-- External CSS -->
</head>
<body>

  <!-- Top bar -->
  <div id="topBar">
    <div id="userInfo">
      <img id="userPhoto" src="" alt="User Photo">
      <span id="userName"></span>
    </div>
    <div id="courtNameDisplay"></div>
  </div>

  <!-- Main container -->
  <div class="container">

    <!-- Login Button -->
    <button id="loginBtn" onclick="login()">Login with Google</button>

    <!-- Court Name Input -->
    <div id="courtNameDiv" style="display:none; margin-top:20px;">
      <input type="text" id="courtNameInput" placeholder="Enter your Court Name">
      <button onclick="saveCourtName()">Save Court Name</button>
    </div>

    <!-- Features Links -->
    <div id="mainFeatures" style="display:none; margin-top:30px;">
      <a href="#" id="allCasesLink">All Cases</a>
      <a href="#" id="orderSheetLink">Order Sheet</a>
      <a href="#" id="noticeMakerLink">Notice Maker</a>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-links">
      <a href="#">Link 1</a>
      <a href="#">Link 2</a>
      <a href="#">Link 3</a>
      <a href="#">Link 4</a>
      <a href="#">Link 5</a>
    </div>
    <div class="footer-copy">&copy; 2026 Court Case Manager | All rights reserved</div>
  </footer>

  <!-- Firebase and JS -->
  <script type="module">
    import { initializeApp } 
      from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } 
      from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } 
      from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC4XtFoWYizUUVlhI5pQqwbxcxmjOwyWY0",
      authDomain: "court-case-manager-99e61.firebaseapp.com",
      projectId: "court-case-manager-99e61",
      storageBucket: "court-case-manager-99e61.firebasestorage.app",
      messagingSenderId: "446835586016",
      appId: "1:446835586016:web:57083df006340ca4173185"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Login
    window.login = function() {
      signInWithPopup(auth, provider)
        .then((result) => {
          alert("Login successful: " + result.user.email);
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
    };

    // Handle auth state
    onAuthStateChanged(auth, async (user) => {
      if(user){
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("userInfo").style.display = "flex";
        document.getElementById("userName").textContent = user.displayName;
        document.getElementById("userPhoto").src = user.photoURL;

        // Check Firestore for saved court name
        const docRef = doc(db,"users",user.uid);
        const docSnap = await getDoc(docRef);
        if(docSnap.exists() && docSnap.data().courtName){
          document.getElementById("courtNameDisplay").textContent = docSnap.data().courtName;
          document.getElementById("courtNameDisplay").style.display = "block";
          document.getElementById("mainFeatures").style.display = "flex";
        } else {
          document.getElementById("courtNameDiv").style.display = "block";
        }
      } else {
        document.getElementById("loginBtn").style.display = "block";
        document.getElementById("userInfo").style.display = "none";
        document.getElementById("courtNameDiv").style.display = "none";
        document.getElementById("mainFeatures").style.display = "none";
        document.getElementById("courtNameDisplay").style.display = "none";
      }
    });

    // Save Court Name
    window.saveCourtName = async function(){
      const courtName = document.getElementById("courtNameInput").value.trim();
      const user = auth.currentUser;
      if(!courtName){
        alert("Please enter court name");
        return;
      }
      if(user){
        await setDoc(doc(db,"users",user.uid),{
          email: user.email,
          courtName: courtName
        });
        document.getElementById("courtNameDiv").style.display = "none";
        document.getElementById("courtNameDisplay").textContent = courtName;
        document.getElementById("courtNameDisplay").style.display = "block";
        document.getElementById("mainFeatures").style.display = "flex";
        alert("Court name saved successfully!");
      } else {
        alert("User not logged in!");
      }
    };

    // Placeholder feature links
    document.getElementById("allCasesLink").onclick = ()=>alert("All Cases coming soon");
    document.getElementById("orderSheetLink").onclick = ()=>alert("Order Sheet coming soon");
    document.getElementById("noticeMakerLink").onclick = ()=>alert("Notice Maker coming soon");

  </script>
</body>
</html>
